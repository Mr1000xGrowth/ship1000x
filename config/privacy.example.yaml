# Ship1000x — privacy config example
#
# Copy this to `config/privacy.yaml` and adjust. Or better : run
# `ship1000x init` which generates a privacy.yaml tailored to your setup.

# Per-project share level : "aggregated" (only daily rollups pushed, no
# raw events), "private" (kept local only), or "disabled" (not scanned).
# The special `_default` applies to all projects not listed here.
share:
  # my-backend: aggregated
  # my-app: aggregated
  _default: private

# Paths and keywords to exclude from ingestion (defense-in-depth, most
# redaction also happens in core/privacy.py::sanitize_event).
exclude_paths: null
exclude_keywords:
  - password
  - secret
  - credentials

# Collectors to run. Disable any you don't use to speed up ingest.
sources:
  claude_code: enabled      # ~/.claude/projects/*/history.jsonl
  codex: enabled            # ~/.codex/sessions/**/rollout-*.jsonl
  codex_desktop: enabled    # ~/.codex/state_5.sqlite
  codex_sqlite: enabled     # Codex legacy state (fallback)
  codex_macapp: enabled     # ~/Library/Logs/com.openai.codex/
  cursor: enabled           # Cursor workspace + global SQLite
  cline: enabled            # ~/.claude_cline/chats/*.jsonl
  git: enabled              # git log across all repos under $HOME
  web_exports: enabled      # ZIP drops from ChatGPT/Claude web exports
  shell: disabled           # requires EXTENDED_HISTORY in ~/.zshrc
  mac_system: disabled      # requires pmset permissions

# Optional : push aggregated rollups to your own S3 bucket.
# Compatible with AWS S3, Backblaze B2, Cloudflare R2, Garage, MinIO.
cloud:
  provider: s3
  bucket: ""                # e.g. "my-tracker-data"
  endpoint: ""              # e.g. "https://s3.us-west-004.backblazeb2.com"
  push_enabled: false
  push_time: "03:00"
  retention_days: 365

# Local SQLite retention. -1 = keep forever.
retention:
  events_days: 365
  sessions_days: 730
  rollups_days: -1

# Consent: required before any ingestion. Generated by `ship1000x init`.
consent:
  signed_at: null
  user_email: user@example.com
  display_name: ""
  version: "1.0"
  share_cloud: false        # opt-in : push aggregated rollups to cloud.bucket
