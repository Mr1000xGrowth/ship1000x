{% extends "base.html" %}

{% block title %}Projects · Ship1000x{% endblock %}

{% block content %}
<div class="space-y-8">

  <header class="space-y-2">
    <h1 class="font-display text-4xl tracking-tight">Projects</h1>
    <p class="text-stone text-sm">
      <span id="window-label">Last 30 days</span> · click headers to sort
    </p>
  </header>

  <!-- Filter -->
  <div class="flex gap-4 items-center">
    <input type="text" id="filter-input" placeholder="Filter by project name…"
           class="bg-paper dark:bg-graphite border border-mist dark:border-slate rounded-md px-4 py-2 text-sm w-full max-w-md focus:outline-none focus:border-ambre-500 transition">
    <span class="text-xs text-stone italic" id="result-count">— projects</span>
  </div>

  <div class="bg-paper dark:bg-graphite border border-mist dark:border-slate rounded-lg overflow-hidden">
    <div class="overflow-x-auto">
      <table class="min-w-full text-sm">
        <thead>
          <tr class="border-b border-mist dark:border-slate text-stone text-[11px] uppercase tracking-[0.15em] font-medium">
            <th class="px-5 py-4 text-left cursor-pointer hover:text-ink dark:hover:text-paper transition" data-sort="project_id">Project</th>
            <th class="px-5 py-4 text-right cursor-pointer hover:text-ink dark:hover:text-paper transition" data-sort="total_hours">Active</th>
            <th class="px-5 py-4 text-left">Dominant tool</th>
            <th class="px-5 py-4 text-right cursor-pointer hover:text-ink dark:hover:text-paper transition" data-sort="sources_ia">Sessions IA</th>
            <th class="px-5 py-4 text-right cursor-pointer hover:text-ink dark:hover:text-paper transition" data-sort="commits">Commits</th>
            <th class="px-5 py-4 text-right cursor-pointer hover:text-ink dark:hover:text-paper transition" data-sort="total_cost">Cost</th>
          </tr>
        </thead>
        <tbody id="projects-tbody" class="divide-y divide-mist dark:divide-slate">
          <tr><td colspan="6" class="px-5 py-12 text-center text-stone italic">Loading…</td></tr>
        </tbody>
        <tfoot class="border-t border-mist dark:border-slate font-medium text-ink dark:text-paper">
          <tr>
            <td class="px-5 py-4 font-medium italic" id="foot-projects">—</td>
            <td class="px-5 py-4 text-right font-numeric" id="foot-hours">—</td>
            <td></td>
            <td class="px-5 py-4 text-right font-numeric" id="foot-sessions">—</td>
            <td class="px-5 py-4 text-right font-numeric" id="foot-commits">—</td>
            <td class="px-5 py-4 text-right font-numeric" id="foot-cost">—</td>
          </tr>
        </tfoot>
      </table>
    </div>
  </div>

</div>
{% endblock %}

{% block scripts %}
<script>
let projectsData = [];
let currentSort = { key: 'total_hours', desc: true };

const fmtH = h => !h ? '—' : (h < 1 ? Math.round(h * 60) + 'min' : h.toFixed(1) + 'h');
const fmtCurrency = n => '$' + (n || 0).toLocaleString('en-US', {maximumFractionDigits: 2});
const fmtInt = n => (n || 0).toLocaleString('en-US');

function renderRows() {
  const filter = document.getElementById('filter-input').value.toLowerCase();
  const rows = projectsData.filter(p => p.project_id.toLowerCase().includes(filter));
  rows.sort((a, b) => {
    const va = a[currentSort.key], vb = b[currentSort.key];
    const r = typeof va === 'string' ? va.localeCompare(vb) : (va || 0) - (vb || 0);
    return currentSort.desc ? -r : r;
  });

  const tbody = document.getElementById('projects-tbody');
  if (rows.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6" class="px-5 py-12 text-center text-stone italic">No projects match.</td></tr>';
  } else {
    tbody.innerHTML = rows.map(p => `
      <tr class="hover:bg-chalk dark:hover:bg-slate/30 transition">
        <td class="px-5 py-3 font-mono text-xs text-ink dark:text-paper">${window.anonymizeProjectId(p.project_id)}</td>
        <td class="px-5 py-3 text-right font-numeric font-medium">${fmtH(p.total_hours)}</td>
        <td class="px-5 py-3 text-xs">
          ${p.dominant_tool === 'git only'
            ? '<span class="text-stone italic">git only</span>'
            : `<span class="text-ambre-600 dark:text-ambre-500">${p.dominant_tool}</span> <span class="text-stone">· ${p.dominant_pct}%</span>`
          }
        </td>
        <td class="px-5 py-3 text-right font-numeric text-stone">${p.sources_ia}</td>
        <td class="px-5 py-3 text-right font-numeric text-stone">${p.commits}</td>
        <td class="px-5 py-3 text-right font-numeric">${fmtCurrency(p.total_cost)}</td>
      </tr>
    `).join('');
  }

  document.getElementById('result-count').textContent = `${rows.length} project${rows.length > 1 ? 's' : ''}`;
  document.getElementById('foot-projects').textContent = `Total · ${rows.length}`;
  document.getElementById('foot-hours').textContent = fmtH(rows.reduce((s, p) => s + (p.total_hours || 0), 0));
  document.getElementById('foot-sessions').textContent = fmtInt(rows.reduce((s, p) => s + p.sources_ia, 0));
  document.getElementById('foot-commits').textContent = fmtInt(rows.reduce((s, p) => s + p.commits, 0));
  document.getElementById('foot-cost').textContent = fmtCurrency(rows.reduce((s, p) => s + p.total_cost, 0));
}

async function loadProjects() {
  const days = window.getWindowDays();
  document.getElementById('window-label').textContent = `Last ${days} days`;
  const r = await fetch(`/api/projects?days=${days}`);
  projectsData = await r.json();
  renderRows();
}

document.getElementById('filter-input').addEventListener('input', renderRows);
document.querySelectorAll('th[data-sort]').forEach(th => {
  th.addEventListener('click', () => {
    const key = th.dataset.sort;
    if (currentSort.key === key) currentSort.desc = !currentSort.desc;
    else { currentSort.key = key; currentSort.desc = true; }
    renderRows();
  });
});

async function reloadData() {
  await loadProjects();
}

loadProjects();
</script>
{% endblock %}
